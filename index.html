<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sensation | Coming 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <a href="#home" class="header-logo">
      <img src="assets/logo.jpeg" alt="Sensation">
    </a>
    <nav class="header-nav">
      <a href="#home">Home</a>
      <span class="nav-sep">|</span>
      <a href="#booking">Booking</a>
      <span class="nav-sep">|</span>
      <a href="#gallery">Previous acts</a>
    </nav>
  </header>
  <section id="home" class="hero">
    <div class="video-background">
      <video autoplay muted loop playsinline>
        <source src="assets/showreel.mp4" type="video/mp4">
      </video>
      <div class="overlay"></div>
    </div>
    <div class="content">
      <p class="tagline">Coming 2026</p>
      <div class="ctas">
        <a href="#booking" class="cta">Book now</a>
        <a href="#gallery" class="cta">Previous acts</a>
      </div>
    </div>
  </section>
  <section id="gallery" class="page-section gallery-section">
    <div class="section-inner">
      <h2>Previous acts</h2>
      <div class="gallery">
        <button type="button" class="gallery-item" data-src="images/1.jpeg" data-title="Act 1" data-description="A thrilling variety performance from our previous show.">
          <img src="images/1.jpeg" alt="Previous act">
        </button>
        <button type="button" class="gallery-item" data-src="images/2.jpeg" data-title="Act 2" data-description="Another spectacular act from the Sensation stage.">
          <img src="images/2.jpeg" alt="Previous act">
        </button>
        <button type="button" class="gallery-item" data-src="images/3.jpeg" data-title="Act 3" data-description="Experience the magic of our variety showcase.">
          <img src="images/3.jpeg" alt="Previous act">
        </button>
        <button type="button" class="gallery-item" data-src="images/4.jpeg" data-title="Act 4" data-description="One of our most memorable performances.">
          <img src="images/4.jpeg" alt="Previous act">
        </button>
        <button type="button" class="gallery-item" data-src="images/5.jpeg" data-title="Act 5" data-description="Talented performers captivating the audience.">
          <img src="images/5.jpeg" alt="Previous act">
        </button>
        <button type="button" class="gallery-item" data-src="images/6.jpeg" data-title="Act 6" data-description="The perfect blend of comedy, music and spectacle.">
          <img src="images/6.jpeg" alt="Previous act">
        </button>
      </div>
    </div>
  </section>
  <section id="booking" class="page-section">
    <div class="section-inner">
      <h2>Booking</h2>
      <p>Book your tickets for Sensation. Details coming soon.</p>
    </div>
  </section>
  <div id="lightbox" class="lightbox" aria-hidden="true" role="dialog">
    <div class="lightbox-backdrop"></div>
    <button type="button" class="lightbox-arrow lightbox-prev" aria-label="Previous">&lsaquo;</button>
    <button type="button" class="lightbox-arrow lightbox-next" aria-label="Next">&rsaquo;</button>
    <div class="lightbox-content">
      <button type="button" class="lightbox-close" aria-label="Close">&times;</button>
      <img src="" alt="" class="lightbox-image">
      <div class="lightbox-caption">
        <h3 class="lightbox-title"></h3>
        <p class="lightbox-description"></p>
      </div>
    </div>
  </div>
  <script src="lightbox.js"></script>
</body>
</html>
