<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sensation | Coming 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <a href="#home" class="header-logo">
      <img src="assets/logo.jpeg" alt="Sensation">
    </a>
    <nav class="header-nav">
      <a href="#home">Home</a>
      <span class="nav-sep">|</span>
      <a href="#booking">Booking</a>
      <span class="nav-sep">|</span>
      <a href="#about">About</a>
    </nav>
  </header>
  <section id="home" class="hero">
    <div class="video-background">
      <video autoplay muted loop playsinline>
        <source src="assets/showreel.mp4" type="video/mp4">
      </video>
      <div class="overlay"></div>
    </div>
    <div class="content">
      <p class="tagline">Coming 2026</p>
      <div class="ctas">
        <a href="#booking" class="cta">Book now</a>
        <a href="#about" class="cta">About</a>
      </div>
    </div>
  </section>
  <section id="booking" class="page-section">
    <div class="section-inner">
      <h2>Booking</h2>
      <p>Book your tickets for Sensation. Details coming soon.</p>
    </div>
  </section>
  <section id="about" class="page-section">
    <div class="section-inner">
      <h2>About</h2>
      <p>Sensation is a variety performance show coming 2026.</p>
    </div>
  </section>
</body>
</html>
